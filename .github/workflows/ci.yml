name: Crypto Pipeline CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:          # manual trigger button in GitHub

jobs:
  # ── Job 1: always runs on push ────────────────────────────
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: crypto_user
          POSTGRES_PASSWORD: crypto_pass
          POSTGRES_DB: crypto_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST:     localhost
      DB_PORT:     5432
      DB_NAME:     crypto_db
      DB_USER:     crypto_user
      DB_PASSWORD: crypto_pass
      PYTHONPATH:  ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt dbt-postgres

      - name: Lint
        run: ruff check .

      - name: Init DB schema
        run: |
          psql postgresql://crypto_user:crypto_pass@localhost/crypto_db \
            -f sql/init.sql

      - name: Unit tests
        run: pytest tests/test_extract.py -v

      - name: Integration tests
        run: pytest tests/test_load.py -v

      - name: Coverage
        run: pytest --cov=pipelines --cov-report=term-missing --cov-fail-under=70 --cov-config=.coveragerc

      - name: Run pipeline
        run: python pipelines/pipeline.py

      - name: dbt run
        working-directory: dbt_project
        run: dbt run --profiles-dir .

      - name: dbt test
        working-directory: dbt_project
        run: dbt test --profiles-dir .

      - name: Build Docker image
        run: docker build -t crypto-pipeline:ci .

  # ── Job 2: only runs when manually triggered ──────────────
  deploy:
    runs-on: ubuntu-latest
    needs: test              # test must pass first
    if: github.event_name == 'workflow_dispatch'  # only on manual trigger

    steps:
      - name: Deploy to Railway
        run: echo "Deploying to Railway... trigger from Railway dashboard"