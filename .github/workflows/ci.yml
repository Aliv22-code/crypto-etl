name: Crypto Pipeline CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: crypto_user
          POSTGRES_PASSWORD: crypto_pass
          POSTGRES_DB: crypto_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: crypto_db
      DB_USER: crypto_user
      DB_PASSWORD: crypto_pass

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: ruff check .

      - name: Init DB schema
        run: |
          psql postgresql://crypto_user:crypto_pass@localhost/crypto_db \
            -f sql/init.sql

      - name: Unit tests
        run: pytest tests/test_extract.py -v

      - name: Integration tests
        run: pytest tests/test_load.py -v

      - name: Coverage
        run: pytest --cov=pipelines --cov-report=term-missing --cov-fail-under=75
      # ── dbt steps ────────────────────────────────────────────
      - name: Run Python pipeline (fill raw data)
        run: python pipelines/pipeline.py

      - name: dbt run
        working-directory: dbt_project
        run: dbt run --profiles-dir .

      - name: dbt test
        working-directory: dbt_project
        run: dbt test --profiles-dir .